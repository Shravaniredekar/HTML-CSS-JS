<!DOCTYPE html>
<html>
<head>
    <title>FizzBuzz</title>
</head>
<body>

    <h2>FizzBuzz Checker</h2>

    <input type="number" id="numberInput" placeholder="Enter a number">
    <button onclick="checkFizzBuzz()">Check</button>

    <p id="result"></p>

    <script>
        function checkFizzBuzz() {
            let num = Number(document.getElementById("numberInput").value);
            let output;

            if (num % 3 === 0 && num % 5 === 0) {
                output = "FizzBuzz";
            } else if (num % 3 === 0) {
                output = "Fizz";
            } else if (num % 5 === 0) {
                output = "Buzz";
            } else {
                output = num;
            }

            document.getElementById("result").innerText = output;
        }
    </script>

</body>
</html>
