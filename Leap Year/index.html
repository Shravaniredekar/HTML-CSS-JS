<!DOCTYPE html>
<html>
<head>
    <title>Leap Year Checker</title>
</head>
<body>

    <h2>Leap Year Checker</h2>

    <input type="number" id="yearInput" placeholder="Enter a year">
    <button onclick="checkLeapYear()">Check</button>

    <p id="result"></p>

    <script>
        function checkLeapYear() {
            let year = Number(document.getElementById("yearInput").value);
            let message;

            if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
                message = year + " is a Leap Year";
            } else {
                message = year + " is Not a Leap Year";
            }

            document.getElementById("result").innerText = message;
        }
    </script>

</body>
</html>
