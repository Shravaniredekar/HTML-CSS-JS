<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="feedback-box">
        <h1>Feedback </h1>

        <form>
            <!-- Radio Buttons -->
            <label>How would you rate our service?</label>
            <div class="options">
                <input type="radio" name="rating"> Excellent
                <input type="radio" name="rating"> Good
                <input type="radio" name="rating"> Average
                <input type="radio" name="rating"> Poor
            </div>

            <!-- Textarea -->
            <label>Your Feedback</label>
            <textarea rows="5" placeholder="Enter your feedback here..."></textarea>

            <!-- Submit Button -->
            <button type="submit">Submit Feedback</button>
        </form>
    </div>

</body>
</html>
