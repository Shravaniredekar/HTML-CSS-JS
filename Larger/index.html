<!DOCTYPE html>
<html>
<head>
    <title>Compare Two Numbers</title>
</head>
<body>

    <h2>Compare Two Integers</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="compareNumbers()">Compare</button>

    <p id="result"></p>

    <script>
        function compareNumbers() {
            let number1 = Number(document.getElementById("num1").value);
            let number2 = Number(document.getElementById("num2").value);

            if (number1 > number2) {
                document.getElementById("result").innerText = number1 + " is larger";
            } else if (number2 > number1) {
                document.getElementById("result").innerText = number2 + " is larger";
            } else {
                document.getElementById("result").innerText = "Both numbers are equal";
            }
        }
    </script>

</body>
</html>
