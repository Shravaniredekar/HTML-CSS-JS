<!DOCTYPE html>
<html>
<head>
    <title>While Loop 3</title>
</head>
<body>
    <h2>First Number After 500 Divisible by 7</h2>

    <script>
        let num = 501;

        while (num % 7 !== 0) {
            num++;
        }

        console.log(num);
    </script>
</body>
</html>
