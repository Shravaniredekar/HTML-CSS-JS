<!DOCTYPE html>
<html>
<head>
    <title>While Loop Example</title>
</head>
<body>
    <h2>First number after 500 divisible by 7</h2>

    <script>
        let number = 501;

        while (number % 7 !== 0) {
            number++;
        }

        document.write("The first number after 500 divisible by 7 is: " + number);
    </script>

</body>
</html>
