<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>
</head>
<body>

    <h2>Grade Calculator</h2>

    <input type="number" id="scoreInput" placeholder="Enter score">
    <button onclick="calculateGrade()">Get Grade</button>

    <p id="result"></p>

    <script>
        function calculateGrade() {
            let score = Number(document.getElementById("scoreInput").value);
            let grade;

            if (score >= 90) {
                grade = "A";
            } else if (score >= 80) {
                grade = "B";
            } else if (score >= 70) {
                grade = "C";
            } else {
                grade = "F";
            }

            document.getElementById("result").innerText = "Grade: " + grade;
        }
    </script>

</body>
</html>
